name: Reviewdog Misspell
on: 
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
jobs:
  misspell:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: reviewdog/action-misspell@v1.27.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
          locale: "US"
          path: docs
          pattern: |
            *.md
            *.MD
            *.txt
            *.TXT
          filter_mode: nofilter
          fail_level: none
          fail_on_error: false
